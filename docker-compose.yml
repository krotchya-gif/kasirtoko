version: '3.8'

services:
  # KasirToko App dengan SQLite
  app:
    build: .
    container_name: kasirtoko
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-ganti-dengan-secret-key-panjang-32-karakter-minimal}
      - FLASK_ENV=production
    volumes:
      # Persist data SQLite
      - ./data:/app/data
      # Backup folder
      - ./backups:/app/backups
    networks:
      - kasirtoko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # KasirToko dengan PostgreSQL (uncomment untuk menggunakan PostgreSQL)
  # app-postgres:
  #   build: .
  #   container_name: kasirtoko
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - SECRET_KEY=${SECRET_KEY}
  #     - POSTGRES_URL=postgresql://postgres:postgres@db:5432/kasirtoko
  #     - FLASK_ENV=production
  #   depends_on:
  #     - db
  #   networks:
  #     - kasirtoko-network

  # PostgreSQL Database (optional)
  # db:
  #   image: postgres:15-alpine
  #   container_name: kasirtoko-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
  #     - POSTGRES_DB=kasirtoko
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - kasirtoko-network

  # Nginx Reverse Proxy (optional untuk production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: kasirtoko-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - kasirtoko-network

networks:
  kasirtoko-network:
    driver: bridge

volumes:
  postgres-data:
