<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KasirToko — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1117;color:#f0f0f8;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
  height:100dvh;text-align:center;padding:24px;}
.wrap{max-width:320px;}
.ico{font-size:64px;margin-bottom:20px;display:block;}
h1{font-size:22px;font-weight:700;margin-bottom:8px;color:#f5a623;}
p{font-size:14px;color:#8891a8;line-height:1.6;margin-bottom:24px;}
button{background:#f5a623;color:#111;border:none;padding:12px 28px;
  border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
button:active{opacity:.8;}
</style>
</head>
<body>
<div class="wrap">
  <span class="ico">📡</span>
  <h1>Tidak Ada Koneksi</h1>
  <p>Pastikan HP dan server dalam jaringan WiFi yang sama, lalu coba lagi.</p>
  <button onclick="location.reload()">🔄 Coba Lagi</button>
</div>
</body>
</html>
